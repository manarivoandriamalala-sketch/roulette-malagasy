<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roulette Casino</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }

        .roulette-game {
            max-width: 1200px;
            margin: 0 auto;
        }

        .game-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .game-header h1 {
            font-size: 3em;
            color: #c9b037;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 10px;
        }

        .info-panel {
            display: flex;
            justify-content: space-around;
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            border: 2px solid #c9b037;
        }

        .credit, .total-bet, .last-number {
            text-align: center;
        }

        .credit span, .total-bet span, .last-number span {
            font-size: 1.8em;
            font-weight: bold;
            color: #c9b037;
            display: block;
        }

        .game-container {
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .wheel-section {
            text-align: center;
        }

        .wheel-container {
            position: relative;
            width: 350px;
            height: 350px;
            margin: 0 auto 20px;
        }

        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            border: 10px solid #2c3e50;
            box-shadow: 
                0 0 30px rgba(0,0,0,0.7),
                inset 0 0 30px rgba(0,0,0,0.5);
            transition: transform 4s cubic-bezier(0.2, 0.8, 0.3, 1);
            background: #27ae60;
        }

        .wheel-number {
            position: absolute;
            width: 50%;
            height: 50%;
            transform-origin: bottom right;
            left: 0;
            top: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 1.1em;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.7);
            cursor: pointer;
        }

        .number-content {
            transform: rotate(45deg);
            text-align: center;
        }

        .indicator {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 50px;
            background: #e74c3c;
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            z-index: 10;
            filter: drop-shadow(0 3px 6px rgba(0,0,0,0.5));
        }

        .indicator::after {
            content: '';
            position: absolute;
            top: 45px;
            left: 20px;
            width: 10px;
            height: 40px;
            background: #e74c3c;
        }

        .betting-section {
            background: rgba(255, 255, 255, 0.05);
            padding: 25px;
            border-radius: 15px;
            border: 2px solid #c9b037;
        }

        .bet-grid {
            display: grid;
            grid-template-columns: repeat(13, 1fr);
            gap: 2px;
            margin-bottom: 20px;
            background: #34495e;
            padding: 10px;
            border-radius: 10px;
        }

        .bet-number {
            background: #2c3e50;
            padding: 15px 5px;
            text-align: center;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s ease;
            font-weight: bold;
            border: 2px solid transparent;
        }

        .bet-number:hover {
            transform: scale(1.05);
        }

        .bet-number.selected {
            border-color: #c9b037;
            background: #34495e;
            box-shadow: 0 0 10px #c9b037;
        }

        .number-0 { background: #27ae60 !important; }
        .red { background: #e74c3c !important; }
        .black { background: #2c3e50 !important; }

        .special-bets {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .special-bet {
            background: #3498db;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            border-radius: 8px;
            font-weight: bold;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .special-bet.selected {
            border-color: #c9b037;
            box-shadow: 0 0 10px #c9b037;
        }

        .controls {
            text-align: center;
            margin: 30px 0;
        }

        .spin-btn {
            background: linear-gradient(145deg, #c9b037, #b89d34);
            color: #1a1a2e;
            border: none;
            padding: 20px 60px;
            font-size: 1.5em;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(201, 176, 55, 0.4);
            text-transform: uppercase;
        }

        .spin-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(201, 176, 55, 0.6);
        }

        .spin-btn:disabled {
            background: #7f8c8d;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .result-panel {
            background: rgba(255, 255, 255, 0.1);
            padding: 25px;
            border-radius: 15px;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
            border: 2px solid #c9b037;
            margin-bottom: 20px;
        }

        .win-message {
            font-size: 2em;
            font-weight: bold;
            color: #2ecc71;
            text-shadow: 0 0 10px rgba(46, 204, 113, 0.7);
            animation: pulse 1s infinite;
            margin-bottom: 10px;
            text-align: center;
        }

        .result-text {
            font-size: 1.3em;
            color: #ecf0f1;
            text-align: center;
        }

        .history {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .history-number {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.7);
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @keyframes winFlash {
            0%, 100% { background-color: transparent; }
            50% { background-color: rgba(46, 204, 113, 0.3); }
        }

        .win-animation {
            animation: winFlash 0.5s ease-in-out 3;
        }
    </style>
</head>
<body>
    <div class="roulette-game">
        <div class="game-header">
            <h1>🎰 ROULETTE EUROPÉENNE 🎰</h1>
        </div>
        
        <div class="info-panel">
            <div class="credit">
                <div>CRÉDIT</div>
                <span id="credit">1000</span>
            </div>
            <div class="total-bet">
                <div>MISE TOTALE</div>
                <span id="totalBet">0</span>
            </div>
            <div class="last-number">
                <div>DERNIER NUMÉRO</div>
                <span id="lastNumber">-</span>
            </div>
        </div>

        <div class="game-container">
            <div class="wheel-section">
                <div class="wheel-container">
                    <div class="indicator"></div>
                    <div class="wheel" id="wheel">
                        <!-- La roue sera générée par JavaScript -->
                    </div>
                </div>
                <div class="controls">
                    <button class="spin-btn" id="spinBtn">JOUER</button>
                </div>
            </div>

            <div class="betting-section">
                <h3>GRILLE DE MISE - Sélectionnez vos numéros</h3>
                <div class="bet-grid" id="betGrid">
                    <!-- La grille de mise sera générée par JavaScript -->
                </div>
                
                <div class="special-bets">
                    <div class="special-bet" data-type="red">ROUGE</div>
                    <div class="special-bet" data-type="black">NOIR</div>
                    <div class="special-bet" data-type="even">PAIR</div>
                    <div class="special-bet" data-type="odd">IMPAIR</div>
                    <div class="special-bet" data-type="low">1-18</div>
                    <div class="special-bet" data-type="high">19-36</div>
                    <div class="special-bet" data-type="dozen1">1-12</div>
                    <div class="special-bet" data-type="dozen2">13-24</div>
                    <div class="special-bet" data-type="dozen3">25-36</div>
                </div>
            </div>
        </div>

        <div class="result-panel" id="resultPanel">
            <div class="result-text">Sélectionnez vos numéros et appuyez sur JOUER</div>
        </div>

        <div class="history" id="history">
            <!-- Historique des numéros -->
        </div>
    </div>

    <script>
        class RouletteGame {
            constructor() {
                this.credit = 1000;
                this.betPerNumber = 10;
                this.selectedNumbers = new Set();
                this.isSpinning = false;
                this.history = [];
                
                // Numéros de la roulette européenne (0-36)
                this.numbers = [
                    { number: 0, color: 'green' },
                    { number: 32, color: 'red' }, { number: 15, color: 'black' }, { number: 19, color: 'red' },
                    { number: 4, color: 'black' }, { number: 21, color: 'red' }, { number: 2, color: 'black' },
                    { number: 25, color: 'red' }, { number: 17, color: 'black' }, { number: 34, color: 'red' },
                    { number: 6, color: 'black' }, { number: 27, color: 'red' }, { number: 13, color: 'black' },
                    { number: 36, color: 'red' }, { number: 11, color: 'black' }, { number: 30, color: 'red' },
                    { number: 8, color: 'black' }, { number: 23, color: 'red' }, { number: 10, color: 'black' },
                    { number: 5, color: 'red' }, { number: 24, color: 'black' }, { number: 16, color: 'red' },
                    { number: 33, color: 'black' }, { number: 1, color: 'red' }, { number: 20, color: 'black' },
                    { number: 14, color: 'red' }, { number: 31, color: 'black' }, { number: 9, color: 'red' },
                    { number: 22, color: 'black' }, { number: 18, color: 'red' }, { number: 29, color: 'black' },
                    { number: 7, color: 'red' }, { number: 28, color: 'black' }, { number: 12, color: 'red' },
                    { number: 35, color: 'black' }, { number: 3, color: 'red' }, { number: 26, color: 'black' }
                ];

                this.initializeGame();
                this.setupEventListeners();
            }

            initializeGame() {
                this.createWheel();
                this.createBetGrid();
                this.updateDisplay();
            }

            createWheel() {
                const wheel = document.getElementById('wheel');
                wheel.innerHTML = '';

                this.numbers.forEach((numObj, index) => {
                    const angle = (index / this.numbers.length) * 360;
                    const numberElement = document.createElement('div');
                    numberElement.className = `wheel-number ${numObj.color}`;
                    numberElement.style.transform = `rotate(${angle}deg)`;
                    numberElement.dataset.number = numObj.number;

                    numberElement.innerHTML = `
                        <div class="number-content">
                            ${numObj.number}
                        </div>
                    `;

                    wheel.appendChild(numberElement);
                });
            }

            createBetGrid() {
                const betGrid = document.getElementById('betGrid');
                betGrid.innerHTML = '';

                // Ajouter le 0
                const zeroElement = document.createElement('div');
                zeroElement.className = 'bet-number number-0';
                zeroElement.textContent = '0';
                zeroElement.dataset.number = '0';
                betGrid.appendChild(zeroElement);

                // Ajouter les numéros 1-36
                for (let i = 1; i <= 36; i++) {
                    const numberElement = document.createElement('div');
                    const numObj = this.numbers.find(n => n.number === i);
                    numberElement.className = `bet-number ${numObj.color}`;
                    numberElement.textContent = i;
                    numberElement.dataset.number = i;
                    betGrid.appendChild(numberElement);
                }
            }

            setupEventListeners() {
                document.getElementById('spinBtn').addEventListener('click', () => {
                    this.spin();
                });

                // Écouteurs pour les numéros
                document.getElementById('betGrid').addEventListener('click', (e) => {
                    if (e.target.classList.contains('bet-number')) {
                        this.toggleNumberSelection(parseInt(e.target.dataset.number));
                    }
                });

                // Écouteurs pour les paris spéciaux
                document.querySelectorAll('.special-bet').forEach(bet => {
                    bet.addEventListener('click', (e) => {
                        this.handleSpecialBet(e.target.dataset.type);
                    });
                });
            }

            toggleNumberSelection(number) {
                if (this.selectedNumbers.has(number)) {
                    this.selectedNumbers.delete(number);
                } else {
                    this.selectedNumbers.add(number);
                }
                this.updateBetDisplay();
            }

            handleSpecialBet(type) {
                const numbers = new Set();
                
                switch(type) {
                    case 'red':
                        this.numbers.filter(n => n.color === 'red' && n.number !== 0).forEach(n => numbers.add(n.number));
                        break;
                    case 'black':
                        this.numbers.filter(n => n.color === 'black').forEach(n => numbers.add(n.number));
                        break;
                    case 'even':
                        for (let i = 1; i <= 36; i++) if (i % 2 === 0) numbers.add(i);
                        break;
                    case 'odd':
                        for (let i = 1; i <= 36; i++) if (i % 2 === 1) numbers.add(i);
                        break;
                    case 'low':
                        for (let i = 1; i <= 18; i++) numbers.add(i);
                        break;
                    case 'high':
                        for (let i = 19; i <= 36; i++) numbers.add(i);
                        break;
                    case 'dozen1':
                        for (let i = 1; i <= 12; i++) numbers.add(i);
                        break;
                    case 'dozen2':
                        for (let i = 13; i <= 24; i++) numbers.add(i);
                        break;
                    case 'dozen3':
                        for (let i = 25; i <= 36; i++) numbers.add(i);
                        break;
                }

                this.selectedNumbers = numbers;
                this.updateBetDisplay();
            }

            updateBetDisplay() {
                // Mettre à jour l'affichage des sélections
                document.querySelectorAll('.bet-number').forEach(element => {
                    const number = parseInt(element.dataset.number);
                    element.classList.toggle('selected', this.selectedNumbers.has(number));
                });

                document.querySelectorAll('.special-bet').forEach(element => {
                    element.classList.remove('selected');
                });

                this.updateDisplay();
            }

            async spin() {
                if (this.isSpinning || this.selectedNumbers.size === 0) return;
                
                const totalBet = this.selectedNumbers.size * this.betPerNumber;
                if (this.credit < totalBet) return;
                
                this.isSpinning = true;
                this.credit -= totalBet;
                this.updateDisplay();
                
                document.getElementById('spinBtn').disabled = true;
                this.hideResult();
                
                // Animation de rotation
                const wheel = document.getElementById('wheel');
                const spinDuration = 4000;
                
                // Choisir un numéro gagnant aléatoire
                const winningNumberObj = this.numbers[Math.floor(Math.random() * this.numbers.length)];
                const winningNumber = winningNumberObj.number;
                const winningIndex = this.numbers.findIndex(n => n.number === winningNumber);
                const targetAngle = 360 * 5 + (360 - (winningIndex / this.numbers.length) * 360);
                
                wheel.style.transition = `transform ${spinDuration}ms cubic-bezier(0.2, 0.8, 0.3, 1)`;
                wheel.style.transform = `rotate(${targetAngle}deg)`;
                
                await new Promise(resolve => {
                    setTimeout(resolve, spinDuration + 100);
                });
                
                // Calculer les gains
                const winAmount = this.calculateWin(winningNumber, totalBet);
                this.credit += winAmount;
                
                // Mettre à jour l'historique
                this.history.unshift(winningNumber);
                if (this.history.length > 10) this.history.pop();
                this.updateHistory();
                
                // Afficher le résultat
                if (winAmount > 0) {
                    this.showWin(winningNumber, winAmount, totalBet);
                } else {
                    this.showLoss(winningNumber, totalBet);
                }
                
                this.isSpinning = false;
                document.getElementById('spinBtn').disabled = false;
                this.updateDisplay();
            }

            calculateWin(winningNumber, totalBet) {
                if (!this.selectedNumbers.has(winningNumber)) return 0;

                // Calcul simple : gain = mise * multiplicateur selon le type de pari
                const selectedCount = this.selectedNumbers.size;
                let multiplier;

                if (selectedCount === 1) multiplier = 35; // Plein
                else if (selectedCount === 2) multiplier = 17; // Cheval
                else if (selectedCount === 3) multiplier = 11; // Transversale
                else if (selectedCount === 4) multiplier = 8; // Carré
                else if (selectedCount === 6) multiplier = 5; // Sixain
                else if (selectedCount === 12) multiplier = 2; // Douzaine
                else if (selectedCount === 18) multiplier = 1; // Rouge/Noir etc.
                else multiplier = 35 / selectedCount; // Approximation pour autres combinaisons

                return Math.floor(totalBet * multiplier / selectedCount);
            }

            showWin(winningNumber, winAmount, totalBet) {
                const resultPanel = document.getElementById('resultPanel');
                const multiplier = Math.round(winAmount / totalBet * this.selectedNumbers.size);
                
                resultPanel.innerHTML = `
                    <div class="win-message">🎉 VOUS AVEZ GAGNÉ ${winAmount} jetons ! 🎉</div>
                    <div class="result-text">Numéro gagnant: ${winningNumber} | Votre mise: ${totalBet} | Multiplicateur: ${multiplier}x</div>
                `;
                resultPanel.classList.add('win-animation');
            }

            showLoss(winningNumber, totalBet) {
                const resultPanel = document.getElementById('resultPanel');
                resultPanel.innerHTML = `
                    <div class="result-text">Numéro gagnant: ${winningNumber} | Vous avez perdu ${totalBet} jetons</div>
                `;
                resultPanel.classList.remove('win-animation');
            }

            hideResult() {
                const resultPanel = document.getElementById('resultPanel');
                resultPanel.innerHTML = `<div class="result-text">La roue tourne...</div>`;
                resultPanel.classList.remove('win-animation');
            }

            updateHistory() {
                const historyElement = document.getElementById('history');
                historyElement.innerHTML = this.history.map(number => {
                    const numObj = this.numbers.find(n => n.number === number);
                    return `<div class="history-number ${numObj.color}">${number}</div>`;
                }).join('');
                
                document.getElementById('lastNumber').textContent = this.history[0] || '-';
            }

            updateDisplay() {
                document.getElementById('credit').textContent = this.credit;
                document.getElementById('totalBet').textContent = this.selectedNumbers.size * this.betPerNumber;
                
                document.getElementById('spinBtn').disabled = 
                    this.isSpinning || 
                    this.selectedNumbers.size === 0 || 
                    this.credit < (this.selectedNumbers.size * this.betPerNumber);
            }
        }

        // Initialiser le jeu
        document.addEventListener('DOMContentLoaded', () => {
            new RouletteGame();
        });
    </script>
</body>
</html>
