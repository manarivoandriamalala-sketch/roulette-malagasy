<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roulette Réelle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="roulette-container">
            <div class="indicator"></div>
            <div class="center-circle"></div>
            <div class="wheel">
                <canvas class="wheel-canvas" id="wheelCanvas" width="500" height="500"></canvas>
            </div>
        </div>
        
        <div class="controls">
            <button class="spin-btn" id="spinBtn">TOURNER LA ROUE</button>
        </div>
        
        <div class="result" id="result">
            Prêt à jouer
        </div>
    </div>
    <!-- Système de Paris -->
<div class="betting-panel">
    <div class="credit-info">
        <div>Crédit: <span id="credit">1000</span> jetons</div>
        <div>Mise: <span id="currentBet">0</span> jetons</div>
    </div>
    
    <div class="number-selection">
        <div class="bet-amount">
            <button class="chip" data-amount="10">10</button>
            <button class="chip" data-amount="50">50</button>
            <button class="chip" data-amount="100">100</button>
        </div>
        <div class="selected-info">
            Numéro(s) sélectionné(s): <span id="selectedInfo">Aucun</span>
        </div>
    </div>
</div>

    <script src="script.js"></script>
</body>
</html>
